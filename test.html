<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel CSS Only</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .carousel {
            width: 300px;
            overflow: hidden;
            position: relative;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .slides {
            display: flex;
            width: 300%;
            transition: transform 0.5s ease-in-out;
        }

        input {
            display: none;
        }

        .slide {
            width: 100%;
            flex: 1 0 100%;
            text-align: center;
            font-size: 24px;
            padding: 50px 0;
            color: white;
        }

        .slide:nth-child(1) { background: #ff5733; }
        .slide:nth-child(2) { background: #33aaff; }
        .slide:nth-child(3) { background: #33cc33; }

        /* Pagination */
        .navigation {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .navigation label {
            width: 10px;
            height: 10px;
            background: gray;
            margin: 5px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Schimbare slide */
        #slide1:checked ~ .slides { transform: translateX(0); }
        #slide2:checked ~ .slides { transform: translateX(-100%); }
        #slide3:checked ~ .slides { transform: translateX(-200%); }

        #slide1:checked ~ .navigation label:nth-child(1),
        #slide2:checked ~ .navigation label:nth-child(2),
        #slide3:checked ~ .navigation label:nth-child(3) {
            background: black;
        }
    </style>
</head>
<body>

<div class="carousel">
    <input type="radio" name="radio" id="slide1" checked>
    <input type="radio" name="radio" id="slide2">
    <input type="radio" name="radio" id="slide3">

    <div class="slides">
        <div class="slide">Slide 1</div>
        <div class="slide">Slide 2</div>
        <div class="slide">Slide 3</div>
    </div>

    <div class="navigation">
        <label for="slide1"></label>
        <label for="slide2"></label>
        <label for="slide3"></label>
    </div>

    <p>Iubita mea e cea mai tareeeeeeeee</p>
</div>

</body>
</html>
